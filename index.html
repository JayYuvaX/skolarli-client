<!DOCTYPE html>
<html>

<head>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

    <script src="https://cdn.tailwindcss.com"></script>

    <script src="js/app.js"></script>

</head>

<body class="bg-gray-100">

    <div class="max-w-3xl mx-auto p-4">

        <div id="landing" class="text-center">

            <h1 class="text-3xl font-bold mb-4">
                Welcome to the Assessment
            </h1>

            <h2 class="mb-6">JavaScript Fundamentals</h2>

            <button id="startTest" class="bg-blue-500 text-white px-6 py-2 rounded">
                Start Test
            </button>

        </div>


        <div id="testArea" class="hidden">

            <div class="flex justify-between items-center mb-4">

                <h2 id="questionNumber"></h2>

                <div class="text-red-500 font-bold" id="timer"></div>

            </div>


            <div class="w-full bg-gray-200 h-3 rounded mb-4">

                <div id="progressBar" class="bg-blue-500 h-3 rounded" style="width:0%"></div>

            </div>


            <div class="bg-white p-4 rounded shadow">

                <h3 id="questionText" class="mb-4"></h3>

                <div id="options"></div>

            </div>


            <div class="flex justify-between mt-4">

                <button id="prevBtn" class="bg-gray-400 text-white px-4 py-2 rounded">
                    Previous
                </button>

                <button id="nextBtn" class="bg-blue-500 text-white px-4 py-2 rounded">
                    Next
                </button>

            </div>


            <div class="mt-6">

                <h4 class="font-bold mb-2">Question Palette</h4>

                <div id="palette" class="grid grid-cols-5 gap-2"></div>

            </div>

            <button id="submitTest" class="mt-6 bg-green-500 text-white px-4 py-2 rounded">
                Submit Assessment
            </button>

        </div>

    </div>

</body>

</html>
