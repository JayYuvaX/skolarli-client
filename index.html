<!DOCTYPE html>
<html>

<head>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

    <script src="https://cdn.tailwindcss.com"></script>

    <script src="js/app.js"></script>

</head>

<body class="min-h-screen bg-gradient-to-r from-blue-50 via-purple-50 to-pink-50">
    <div class="max-w-3xl mx-auto p-4">

        <div id="landing" class="text-center">

            <div id="landing" class="text-center">

                <div class="bg-white/80 backdrop-blur-md shadow-xl rounded-2xl p-10 mt-20">

                    <h1 class="text-4xl md:text-5xl font-extrabold text-blue-600 mb-4">
                        🚀 Online Assessment
                    </h1>

                    <p class="text-gray-600 mb-6 text-lg">
                        Test your knowledge with our interactive quiz platform
                    </p>

                    <h2 class="text-xl font-semibold mb-6 text-purple-600">
                        JavaScript Fundamentals
                    </h2>

                    <!-- Features -->
                    <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-8 text-sm">

                        <div class="bg-blue-50 p-4 rounded-lg">
                            ⏱️ Timed Assessment
                            <p class="text-gray-500 text-xs">Complete within time</p>
                        </div>

                        <div class="bg-purple-50 p-4 rounded-lg">
                            📊 Instant Results
                            <p class="text-gray-500 text-xs">Get score immediately</p>
                        </div>

                        <div class="bg-pink-50 p-4 rounded-lg">
                            🧠 Skill Evaluation
                            <p class="text-gray-500 text-xs">Measure your knowledge</p>
                        </div>

                    </div>

                    <!-- Start Button -->
                    <button id="startTest"
                        class="bg-gradient-to-r from-blue-500 to-purple-500 text-white px-10 py-3 rounded-full text-lg font-semibold shadow-lg hover:scale-105 transition transform">
                        Start Assessment
                    </button>

                </div>

            </div>

        </div>


        <div id="testArea" class="hidden">

            <!-- Top Bar -->
            <div class="flex flex-col md:flex-row justify-between items-center mb-6 bg-white p-4 rounded-xl shadow">

                <h2 id="questionNumber" class="text-lg font-semibold text-blue-600"></h2>

                <div class="text-red-500 font-bold text-xl bg-red-50 px-4 py-1 rounded-lg" id="timer"></div>

            </div>


            <!-- Progress Bar -->
            <div class="w-full bg-gray-200 h-3 rounded-full mb-6">

                <div id="progressBar"
                    class="bg-gradient-to-r from-blue-500 to-purple-500 h-3 rounded-full transition-all duration-300"
                    style="width:0%">
                </div>

            </div>


            <!-- Question Card -->
            <div class="bg-white p-6 rounded-xl shadow-lg">

                <h3 id="questionText" class="text-lg font-semibold mb-6"></h3>

                <div id="options" class="space-y-3"></div>

            </div>


            <!-- Navigation Buttons -->
            <div class="flex justify-around mt-6 bg-white p-4 rounded-xl shadow">

                <button id="prevBtn" class="bg-blue-500 text-white px-6 py-2 rounded-lg hover:bg-blue-600 transition">
                    Previous
                </button>
                <div id="palette" class="grid grid-cols-5 gap-4 rounded-lg"></div>

                <button id="nextBtn" class="bg-blue-500 text-white px-6 py-2 rounded-lg hover:bg-blue-600 transition">
                    Next
                </button>

            </div>


            <!-- Question Palette -->
            <!-- <div class="mt-8 bg-white p-4 rounded-xl shadow">

                <h4 class="font-semibold mb-3 text-gray-700">Question Navigator</h4>

                <div id="palette" class="grid grid-cols-5 md:grid-cols-10 gap-2"></div>

            </div> -->


            <!-- Submit Button -->
            <div class="text-center">

                <button id="submitTest"
                    class="mt-6 bg-gradient-to-r from-green-400 to-blue-400 text-white px-8 py-3 rounded-full font-semibold shadow hover:scale-105 transition">
                    Submit Assessment
                </button>

            </div>

        </div>

    </div>

</body>

</html>
