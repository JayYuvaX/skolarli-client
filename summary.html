<!DOCTYPE html>
<html>

<head>

    <title>Summary</title>

    <script src="https://cdn.tailwindcss.com"></script>

    <script src="js/questions.js"></script>

</head>

<body class="bg-gray-100">

    <div class="max-w-xl mx-auto p-6 bg-white mt-10 shadow rounded">

        <h1 class="text-2xl font-bold mb-4">
            Assessment Summary
        </h1>

        <div id="summary"></div>

    </div>

    <script>

        let answers = JSON.parse(localStorage.getItem("answers")) || {};

        let total = questions.length;

        let answered = Object.keys(answers).length;

        let unanswered = total - answered;

        let correct = 0;
        let wrong = 0;

        questions.forEach(q => {

            let userAnswer = answers[q.id];

            if (userAnswer !== undefined) {

                if (userAnswer === q.correct) {
                    correct++;
                } else {
                    wrong++;
                }

            }

        });

        document.getElementById("summary").innerHTML = `
<p>Total Questions: ${total}</p>
<p>Answered Questions: ${answered}</p>
<p>Unanswered Questions: ${unanswered}</p>
<p class="text-green-600 font-bold">Correct Answers: ${correct}</p>
<p class="text-red-600 font-bold">Wrong Answers: ${wrong}</p>
`;

    </script>

</body>

</html>
