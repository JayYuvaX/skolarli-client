<script>

    let answers = JSON.parse(localStorage.getItem("answers")) || {}

    let total = 5

    let answered = Object.keys(answers).length

    let unanswered = total - answered

    document.write(`
<h2>Assessment Summary</h2>
<p>Total: ${total}</p>
<p>Answered: ${answered}</p>
<p>Unanswered: ${unanswered}</p>
`)

</script>
