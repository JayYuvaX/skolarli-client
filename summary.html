<script src="https://cdn.tailwindcss.com"></script>
<div id="summary" class="hidden "></div>

<button onclick="goHome()" class="mt-6 bg-blue-500 text-white px-6 py-2 rounded">
    Go to Home
</button>


<div id="review" class="hidden" cla></div>

<script>

    let answers = JSON.parse(localStorage.getItem("answers")) || {}

    fetch("https://skolarli-server.onrender.com/api/questions")
        .then(res => res.json())
        .then(data => {
            // document.getElementById("loader").style.display = "none"
            document.getElementById("summary").classList.remove("hidden")
            document.getElementById("review").classList.remove("hidden")
            let total = data.length
            let answered = Object.keys(answers).length
            let unanswered = total - answered

            let correct = 0
            let wrong = 0

            data.forEach(q => {

                if (answers[q._id] !== undefined) {

                    if (parseInt(answers[q._id]) === q.correct) {
                        correct++
                    } else {
                        wrong++
                    }

                }

            })

            document.getElementById("summary").innerHTML = `

<h2 class="text-2xl font-bold mb-4">Assessment Summary</h2>

<p>Total Questions: ${total}</p>
<p>Answered Questions: ${answered}</p>
<p>Unanswered Questions: ${unanswered}</p>

<p class="text-green-600 font-bold">Correct Answers: ${correct}</p>
<p class="text-red-600 font-bold">Wrong Answers: ${wrong}</p>

`

        })


    // MOVE FUNCTION OUTSIDE
    function goHome() {

        localStorage.removeItem("answers")

        window.location.href = "index.html"

    }

</script>
